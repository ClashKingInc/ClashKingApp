name: E2E Tests (Playwright)

on:
  # Called by web_deploy.yml after a PR preview deployment
  workflow_call:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: true
        type: string
  # Triggered automatically after main-branch deployment
  workflow_run:
    workflows: ["Deploy Flutter Web to Cloudflare Pages"]
    types: [completed]
    branches: [main]
  # Allow manual trigger with custom URL
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'https://app.clashk.ing'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Run always except when triggered by a failed workflow_run deployment
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    defaults:
      run:
        working-directory: e2e

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ inputs.base_url || 'https://app.clashk.ing' }}
          TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_TEST_COC_TAG: ${{ secrets.E2E_TEST_COC_TAG }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
