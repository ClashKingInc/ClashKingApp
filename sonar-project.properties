sonar.projectKey=ClashKingInc_ClashKingApp
sonar.organization=clashkinginc
sonar.projectName=ClashKingApp

sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Coverage report generated by flutter test --coverage
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclude generated l10n files from analysis (and implicitly from coverage)
sonar.exclusions=lib/l10n/app_localizations*.dart

# UI code (pages, widgets) is tested via integration/manual tests, not unit tests.
# Bootstrap and platform-specific helpers are excluded as they are not unit-testable.
# Excluding from coverage so the metric reflects only testable business logic
# (services, models, utils).
sonar.coverage.exclusions=\
  lib/main.dart,\
  lib/features/*/presentation/**,\
  lib/features/*/widgets/**,\
  lib/features/pages/**,\
  lib/widgets/**,\
  lib/common/**,\
  lib/core/app/**,\
  lib/core/theme/**,\
  lib/core/utils/discord_auth_helper*.dart,\
  lib/core/utils/deep_link_handler.dart
