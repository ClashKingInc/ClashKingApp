sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Coverage report generated by flutter test --coverage
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclude generated l10n files (ARB-generated, no point analysing)
sonar.exclusions=lib/l10n/app_localizations*.dart
sonar.coverage.exclusions=lib/l10n/app_localizations*.dart
