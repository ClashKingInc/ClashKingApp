sonar.projectKey=ClashKingInc_ClashKingApp
sonar.organization=clashkinginc
sonar.projectName=ClashKingApp

sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Coverage report generated by flutter test --coverage
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclude generated l10n files from analysis (and implicitly from coverage)
sonar.exclusions=lib/l10n/app_localizations*.dart

# Exclude generated entry points and platform adapters that require host APIs.
# Presentation and feature code remains visible so coverage reflects the app.
sonar.coverage.exclusions=\
  lib/main.dart,\
  lib/core/utils/discord_auth_helper*.dart,\
  lib/core/services/android_workmanager_service.dart,\
  lib/core/services/live_activity_debug_service.dart,\
  lib/core/services/notification_debug_service.dart,\
  lib/core/utils/file_opener.dart
