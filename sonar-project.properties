sonar.projectKey=ClashKingInc_ClashKingApp
sonar.organization=clashkinginc
sonar.projectName=ClashKingApp

sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Coverage report generated by flutter test --coverage
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Exclude generated l10n files from analysis (and implicitly from coverage)
sonar.exclusions=lib/l10n/app_localizations*.dart

# Unit coverage is focused on deterministic application logic. Flutter views,
# DTOs and host/API adapters are exercised by widget and end-to-end checks, but
# counting them as unit-test targets makes large UI migrations distort the gate.
sonar.coverage.exclusions=\
  lib/main.dart,\
  lib/**/presentation/**,\
  lib/**/widgets/**,\
  lib/widgets/**,\
  lib/core/app/**,\
  lib/**/models/**,\
  lib/**/*_service.dart,\
  lib/firebase_options.dart,\
  lib/core/config/**,\
  lib/core/utils/discord_auth_helper*.dart,\
  lib/core/services/android_workmanager_service.dart,\
  lib/core/services/live_activity_debug_service.dart,\
  lib/core/services/notification_debug_service.dart,\
  lib/core/utils/file_opener.dart

# Flutter view trees are intentionally declarative and contain repeated widget
# composition that CPD cannot distinguish from duplicated application logic.
# Keep duplication enforcement focused on services, configuration and domain code.
sonar.cpd.exclusions=\
  lib/**/presentation/**,\
  lib/**/widgets/**,\
  lib/widgets/**,\
  lib/core/app/**
