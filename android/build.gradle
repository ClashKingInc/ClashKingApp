buildscript {
    ext.kotlin_version = '2.3.20'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    project.evaluationDependsOn(':app')
}

// Force compileSdk 37 on all plugin subprojects AFTER each project is fully configured,
// so this overrides any compileSdk set inside plugin build.gradle files.
gradle.afterProject { project ->
    if (project != rootProject && project.hasProperty('android')) {
        project.android.compileSdkVersion(37)
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

