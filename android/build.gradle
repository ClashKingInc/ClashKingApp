buildscript {
    ext.kotlin_version = '2.3.20'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    configurations.configureEach {
        resolutionStrategy {
            force 'androidx.test.espresso:espresso-core:3.6.1'
            force 'androidx.test.espresso:espresso-idling-resource:3.6.1'
        }
    }
}

subprojects { project ->
    project.plugins.withId("com.android.library") {
        project.android.compileSdkVersion(36)
        if (project.file("src/main/kotlin").exists() && !project.plugins.hasPlugin("org.jetbrains.kotlin.android")) {
            project.apply plugin: "org.jetbrains.kotlin.android"
        }
    }
    project.plugins.withId("org.jetbrains.kotlin.android") {
        if (project.name != "app") {
            project.afterEvaluate {
                def targetCompatibility = project.android?.compileOptions?.targetCompatibility
                def kotlinJvmTarget = targetCompatibility == JavaVersion.VERSION_1_8
                    ? "1.8"
                    : (targetCompatibility?.majorVersion ?: "17")
                project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                    kotlinOptions {
                        jvmTarget = kotlinJvmTarget
                    }
                }
            }
        }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

